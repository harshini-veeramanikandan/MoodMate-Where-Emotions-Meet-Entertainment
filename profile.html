<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoodMate — Profile</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">
<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">
      <img src="image.png" alt="MoodMate Logo" class="logo">
      <h1>MoodMate</h1>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="playlists.html">Playlists</a>
      <a href="movies.html">Movies</a>
      <a href="music.html">Music</a>
      <a href="games.html">Games</a>
      <a href="voice-mood.html">🎙️ Voice</a>
      <a href="streak.html">🔥 Streak</a>
      <a href="profile.html" class="active">Profile</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="header">
    <!-- LEFT: profile content -->
    <div class="hero">
      <h2>Profile</h2>
      <p>Switch accounts or sign out.</p>

      <div id="currentUser" class="section" style="margin-top:16px;"></div>

      <div class="section">
        <h3>All accounts</h3>
        <div id="usersGrid" class="grid"></div>
      </div>
    </div>

    <!-- RIGHT: actions panel -->
    <div class="summary">
      <h3>Actions</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button id="logoutBtn" class="btn danger">Sign out</button>
        <a class="btn" href="login.html">Login / Sign up</a>
        <a class="btn" href="playlists.html">View Favorites</a>
      </div>
    </div>
  </div>
</div>

<footer class="footer">© MoodMate — profile</footer>

<script src="script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    applyMoodTheme("romantic");
    renderNavUser();

    const currentUser = document.getElementById("currentUser");
    const usersGrid   = document.getElementById("usersGrid");
    const logoutBtn   = document.getElementById("logoutBtn");

    const session = getSession();
    currentUser.innerHTML = session
      ? `<div class="card"><div class="body"><div class="title"><span class="avatar">${session.avatar}</span> ${session.username}</div><div class="meta">Currently logged in</div></div></div>`
      : `<p class="meta">Not logged in.</p>`;

    const users = getUsers();
    usersGrid.innerHTML = users.length
      ? users.map(u => `
          <div class="card"><div class="body">
            <div class="title"><span class="avatar">${u.avatar}</span> ${u.username}</div>
            <div class="actions">
              <button class="btn" data-username="${u.username}">Switch</button>
            </div>
          </div></div>
        `).join("")
      : `<p class="meta">No accounts yet.</p>`;

    usersGrid.querySelectorAll("button[data-username]").forEach(btn => {
      btn.addEventListener("click", () => {
        setSession({ username: btn.dataset.username, avatar: btn.dataset.username.slice(0,1).toUpperCase() });
        location.href = "index.html";
      });
    });

    logoutBtn.addEventListener("click", () => { logout(); location.href = "index.html"; });
  });
</script>

<a class="mic-float" href="voice-mood.html" title="Voice Mood Detector">🎙️</a>
</body>
</html>
